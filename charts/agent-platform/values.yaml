# Default values for the agent-platform umbrella chart.

images:
  backend:
    repository: agent-platform-backend
    tag: dev
    pullPolicy: IfNotPresent
  runner:
    repository: agent-platform-runner
    tag: dev
  web:
    repository: agent-platform-web
    tag: dev
    pullPolicy: IfNotPresent

# Per-service resource requests/limits for the agent-platform-owned Deployments
# (api, dispatcher, recorder, web). Subchart (postgresql/kafka) resources are
# configured under the `postgresql:` and `kafka:` keys below.
resources:
  api:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 256Mi
  dispatcher:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 256Mi
  recorder:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 256Mi
  web:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 128Mi

web:
  service:
    type: LoadBalancer
    port: 8090
    targetPort: 8080

# Default-deny-ingress + per-component allowlists (see templates/networkpolicy.yaml).
# k3s enforces NetworkPolicy via its embedded controller. `egress` adds a
# default-deny-egress stage (DNS + intra-namespace + external :443 allowlists).
networkPolicy:
  enabled: true
  egress: true

# Conversation connectors (long-lived bridges to external chat). Discord is
# implemented but OFF by default — enable once the `discord-bot` secret (key:
# token) is set. Slack is a stub (not deployed).
connectors:
  discord:
    enabled: false
    agent: echo            # default agent for new Discord conversations
    image:
      repository: agent-platform-connector-discord
      tag: dev
      pullPolicy: IfNotPresent

# agents-sync keeps a PVC of the agent-definitions git repo up to date so the
# api (read-only) and runner Jobs (spawned by the dispatcher, not by this
# chart) can read agent definitions from a shared volume.
agents:
  gitRepo: "https://github.com/kylep/agent-platform.git"
  # Branch (or tag) the sync tracks. Agent definitions live in git; this is
  # which line of history the cluster follows.
  gitRef: "main"
  syncIntervalSeconds: 60
  storage: 1Gi
  storageClass: ""

# Env vars applied to the api/dispatcher/recorder Deployments (AP_ prefix,
# see services/backend/agentplatform/config.py). AP_DB_URL, AP_KAFKA_BOOTSTRAP,
# AP_RUNNER_IMAGE and AP_AGENTS_ROOT are computed in the templates from other
# values and are not set here. AP_SESSION_SECRET has intentionally no default
# below -- the templates use `required` and installs fail without one, e.g.
#   --set env.AP_SESSION_SECRET=... or -f a values file that sets it.
env:
  AP_K8S_NAMESPACE: ""
  AP_GLOBAL_CONCURRENCY: "3"
  AP_RUN_TIMEOUT_SECONDS: "1800"
  AP_AGENTS_VOLUME_CLAIM: "agent-definitions"
  # Self-hosting git target (M2). Empty git_remote_url disables self-edit.
  # The push/PR credential is the `github-token` secret (key: token).
  AP_GIT_REMOTE_URL: ""
  AP_GITHUB_REPO: ""
  AP_DEFAULT_BRANCH: "main"

# Kafka topics created by the post-install/post-upgrade topics-job hook.
# Per-topic partitions + retention (event bus, see agentplatform/events.py).
# RF=1 everywhere (single broker); documented durability limit.
topics:
  replicationFactor: 1
  # retentionMs quoted as strings — Helm renders large ints in scientific
  # notation (3600000 → 3.6e+06), which kafka's config parser rejects.
  specs:
    - {name: run.inbound, partitions: 6, retentionMs: "3600000"}       # 1h
    - {name: run.requests, partitions: 6, retentionMs: "3600000"}      # 1h
    - {name: run.events, partitions: 6, retentionMs: "3600000"}        # 1h
    - {name: run.transcript, partitions: 6, retentionMs: "3600000"}    # 1h (in DB)
    - {name: run.dlq, partitions: 1, retentionMs: "604800000"}         # 7d
    - {name: conversation.inbound, partitions: 6, retentionMs: "86400000"}   # 24h
    - {name: conversation.outbound, partitions: 6, retentionMs: "86400000"}  # 24h
    - {name: dead.letter, partitions: 1, retentionMs: "604800000"}     # 7d
  # Hand-pinned to match the kafka.image.tag the bitnami/kafka subchart
  # (Chart.yaml dependency) currently pulls in via its appVersion. This can
  # drift: when Chart.yaml bumps the kafka dependency version, re-check
  # https://github.com/bitnami/charts/blob/main/bitnami/kafka/Chart.yaml
  # (appVersion) and bump this tag to match so kafka-topics.sh stays
  # compatible with the broker's protocol version.
  image:
    registry: docker.io
    # bitnamilegacy: Bitnami's 2025 catalog migration removed versioned tags
    # from docker.io/bitnami; pinned tags live on under bitnamilegacy/.
    repository: bitnamilegacy/kafka
    tag: 4.0.0-debian-12-r10

# --- Subchart values (bitnami/postgresql, bitnami/kafka) ---

postgresql:
  auth:
    database: agentplatform
  primary:
    persistence:
      enabled: true
      size: 2Gi

kafka:
  # bitnamilegacy: see topics.image comment — versioned tags left docker.io/bitnami.
  image:
    registry: docker.io
    repository: bitnamilegacy/kafka
    tag: 4.0.0-debian-12-r10
  # Single-node KRaft controller-only mode (no dedicated broker pool).
  controller:
    replicaCount: 1
  broker:
    replicaCount: 0
  # LAN/M1 posture: no SASL credentials are wired into this chart, but the
  # bitnami/kafka 32.4.3 default (listeners.client.protocol: SASL_PLAINTEXT)
  # requires them, which breaks topics-job and every aiokafka client. Force
  # PLAINTEXT for the client listener until SASL is added in the hardening
  # milestone.
  listeners:
    client:
      protocol: PLAINTEXT
