apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
  labels:
    {{- include "agent-platform.selectorLabels" (dict "Release" .Release "Chart" .Chart "component" "web") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "agent-platform.selectorLabels" (dict "Release" .Release "Chart" .Chart "component" "web") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agent-platform.selectorLabels" (dict "Release" .Release "Chart" .Chart "component" "web") | nindent 8 }}
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: "{{ .Values.images.web.repository }}:{{ .Values.images.web.tag }}"
          imagePullPolicy: {{ .Values.images.web.pullPolicy | default "IfNotPresent" }}
          # Stock nginx: master runs as root and needs SETUID/SETGID/CHOWN to
          # spawn workers, so caps are NOT dropped and runAsNonRoot is omitted.
          # We still forbid privilege escalation (+ seccomp at the pod level).
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: 8080
          resources:
            {{- toYaml .Values.resources.web | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-web
  labels:
    {{- include "agent-platform.selectorLabels" (dict "Release" .Release "Chart" .Chart "component" "web") | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  selector:
    {{- include "agent-platform.selectorLabels" (dict "Release" .Release "Chart" .Chart "component" "web") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: {{ .Values.web.service.targetPort }}
