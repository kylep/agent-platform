apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.env.AP_AGENTS_VOLUME_CLAIM }}
  labels:
    {{- include "agent-platform.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.agents.storageClass }}
  storageClassName: {{ .Values.agents.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.agents.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-agents-sync
  labels:
    {{- include "agent-platform.selectorLabels" (dict "Release" .Release "Chart" .Chart "component" "agents-sync") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "agent-platform.selectorLabels" (dict "Release" .Release "Chart" .Chart "component" "agents-sync") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agent-platform.selectorLabels" (dict "Release" .Release "Chart" .Chart "component" "agents-sync") | nindent 8 }}
    spec:
      containers:
        - name: agents-sync
          image: alpine/git:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              if [ ! -d /agents/.git ]; then
                echo "cloning $GIT_REPO ($GIT_REF) into /agents"
                git clone --depth 1 --branch "$GIT_REF" "$GIT_REPO" /agents
              fi
              while true; do
                git -C /agents fetch --depth 1 origin "$GIT_REF" \
                  && git -C /agents checkout -q "$GIT_REF" \
                  && git -C /agents reset --hard -q "origin/$GIT_REF" \
                  || echo "agents-sync: sync failed, will retry"
                sleep "$SYNC_INTERVAL_SECONDS"
              done
          env:
            - name: GIT_REPO
              value: {{ .Values.agents.gitRepo | quote }}
            - name: GIT_REF
              value: {{ .Values.agents.gitRef | quote }}
            - name: SYNC_INTERVAL_SECONDS
              value: {{ .Values.agents.syncIntervalSeconds | quote }}
          volumeMounts:
            - name: agent-definitions
              mountPath: /agents
      volumes:
        - name: agent-definitions
          persistentVolumeClaim:
            claimName: {{ .Values.env.AP_AGENTS_VOLUME_CLAIM }}
