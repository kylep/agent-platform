# Memory profile for the pai-nuc single-node cluster (local-path storage,
# tight resource envelope). Layer over values.yaml with:
#   helm install agent-platform charts/agent-platform -f values-pai-nuc.yaml \
#     --set env.AP_SESSION_SECRET=...

resources:
  api:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 256Mi
  dispatcher:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 256Mi
  recorder:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 256Mi
  web:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 128Mi

agents:
  storageClass: local-path
  storage: 1Gi

# Self-hosting loop (M2): the platform edits its own repo. Push/PR auth is the
# `github-token` secret. NOTE: currently a personal gh token — migrate to the
# PericakAI GitHub App (tracked in docs/design/06-hardening.md).
env:
  AP_GIT_REMOTE_URL: "https://github.com/kylep/agent-platform.git"
  AP_GITHUB_REPO: "kylep/agent-platform"
  AP_DEFAULT_BRANCH: "main"

postgresql:
  primary:
    resources:
      requests:
        memory: 1Gi
        cpu: 250m
      limits:
        memory: 2Gi
    persistence:
      storageClass: local-path
      size: 2Gi

kafka:
  controller:
    resources:
      requests:
        memory: 2Gi
        cpu: 500m
      limits:
        memory: 3Gi
    heapOpts: "-Xmx1024m -Xms1024m"
    persistence:
      storageClass: local-path
      size: 4Gi
    logPersistence:
      storageClass: local-path
      size: 4Gi

# Discord conversation connector: the bot is live as Pai#9508 and answers as the
# `pai` agent. A mention creates a Discord thread == a platform Conversation;
# replies post back in-thread. Requires the discord-bot secret + Message Content
# Intent enabled in the Discord Developer Portal.
connectors:
  discord:
    enabled: true
    agent: pai
