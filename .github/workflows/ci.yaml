name: CI

on:
  push:
  pull_request:

# Least privilege: jobs only need to read the repo.
permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: pip install -e 'services/backend[dev]'
      - name: Run backend tests
        run: pytest services/backend/tests

  runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runner deps
        run: pip install aiokafka pytest pytest-asyncio
      - name: Run runner tests
        run: cd services/runner && python -m pytest test_runner.py

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install and build web
        run: cd services/web && npm ci && npm run build

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Update chart dependencies
        # OCI deps (bitnamicharts) are handled natively by helm 3.8+; no login needed.
        run: helm dependency update charts/agent-platform
      - name: Lint chart
        run: helm lint charts/agent-platform --set env.AP_SESSION_SECRET=x

  security-scan:
    # Supply-chain hardening (M06): scan the repo for vulnerable deps, leaked
    # secrets, IaC misconfig, and risky code patterns. Report-only for now
    # (exit-code 0 / continue-on-error) — a visibility baseline before gating.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        # Pinned to a full commit SHA (supply-chain: don't track a mutable tag).
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true
      - name: Semgrep scan
        continue-on-error: true
        run: |
          pip install semgrep==1.170.0
          semgrep --config p/python --config p/typescript --config p/secrets \
            --error --severity ERROR services/

  subscription-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: forbid API-key auth
        # docs/ may quote the forbidden strings when describing this guard;
        # the constraint binds code and config, so docs are excluded.
        run: |
          ! grep -rn --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.venv --exclude-dir=dist --exclude-dir=docs --exclude=ci.yaml -e 'sk-ant-' -e 'ANTHROPIC_API_KEY' .
